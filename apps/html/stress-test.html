<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Canvas - 2000 Card Stress Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fafafa; color: #1a1a1a; padding: 20px; }
  @media (prefers-color-scheme: dark) { body { background: #141414; color: #e5e5e5; } }

  #ic-wrap { position: relative; width: 100%; height: calc(100vh - 100px); overflow: hidden; background: #f0f0f0; border-radius: 12px; border: 0.5px solid #e0e0e0; cursor: grab; user-select: none; touch-action: none; }
  @media (prefers-color-scheme: dark) { #ic-wrap { background: #1e1e1e; border-color: #333; } }
  #ic-wrap.dragging { cursor: grabbing; }
  #ic-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  #ic-info { position: absolute; bottom: 12px; left: 12px; font-size: 12px; font-family: monospace; color: #888; pointer-events: none; }
  #ic-hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #999; pointer-events: none; background: #fafafa; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #e0e0e0; white-space: nowrap; }
  @media (prefers-color-scheme: dark) { #ic-hint { background: #1a1a1a; border-color: #333; color: #666; } }

  #ic-controls { display: flex; gap: 8px; align-items: center; margin: 10px 0 0; }
  #ic-controls button { font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; color: #333; }
  #ic-controls button:hover { background: #f0f0f0; }
  @media (prefers-color-scheme: dark) {
    #ic-controls button { background: #2a2a2a; border-color: #444; color: #ccc; }
    #ic-controls button:hover { background: #333; }
  }
  #stats { font-size: 12px; font-family: monospace; color: #888; margin-left: 8px; }
</style>
</head>
<body>

<div id="ic-wrap">
  <canvas id="ic-canvas"></canvas>
  <div id="ic-hint">2000 Card Stress Test - Drag to pan / Scroll to zoom</div>
  <div id="ic-info">x: 0  y: 0  zoom: 1.00x</div>
</div>
<div id="ic-controls">
  <button onclick="resetView()">Reset view</button>
  <button onclick="addCards(100)">Add 100 more</button>
  <button onclick="zoomToFit()">Zoom to fit</button>
  <span id="stats">Loading...</span>
</div>

<script>
// ── Generate 2000 cards in a grid layout ──────────────────────────
const COLS = 50;
const CARD_W = 160;
const CARD_H = 90;
const GAP_X = 40;
const GAP_Y = 40;
const CARD_COUNT = 2000;

const cards = [];
for (let i = 0; i < CARD_COUNT; i++) {
  const col = i % COLS;
  const row = Math.floor(i / COLS);
  cards.push({
    x: col * (CARD_W + GAP_X),
    y: row * (CARD_H + GAP_Y),
    w: CARD_W,
    h: CARD_H,
    title: 'Card ' + (i + 1),
    body: 'Row ' + (row + 1) + ' Col ' + (col + 1),
  });
}

// ── State ─────────────────────────────────────────────────────────
let camera = { x: 0, y: 0, zoom: 1 };
let dragging = false;
let lastPt = { x: 0, y: 0 };

const wrap = document.getElementById('ic-wrap');
const canvas = document.getElementById('ic-canvas');
const info = document.getElementById('ic-info');
const stats = document.getElementById('stats');

// ── Worker ────────────────────────────────────────────────────────
const offscreen = canvas.transferControlToOffscreen();
const worker = new Worker('canvas.worker.js');

const t0 = performance.now();
worker.postMessage({
  type: 'init',
  data: {
    canvas: offscreen,
    width: wrap.clientWidth,
    height: wrap.clientHeight,
    camera: camera,
    cards: cards,
    dark: matchMedia('(prefers-color-scheme: dark)').matches,
  }
}, [offscreen]);

worker.onmessage = (e) => {
  if (e.data.type === 'hud') {
    const d = e.data.data;
    info.textContent = 'world: (' + d.wx + ', ' + d.wy + ')  zoom: ' + d.zoom + 'x';
    if (d.renderMs !== undefined) {
      stats.textContent = cards.length + ' cards | render: ' + d.renderMs + 'ms | fps: ' + d.fps;
    } else {
      stats.textContent = cards.length + ' cards | init: ' + Math.round(performance.now() - t0) + 'ms';
    }
  }
};

// ── Resize ────────────────────────────────────────────────────────
const ro = new ResizeObserver(entries => {
  const { width, height } = entries[0].contentRect;
  worker.postMessage({ type: 'resize', data: { width, height } });
});
ro.observe(wrap);

// ── Theme ─────────────────────────────────────────────────────────
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  worker.postMessage({ type: 'theme', data: { dark: e.matches } });
});

// ── Pan ───────────────────────────────────────────────────────────
wrap.addEventListener('pointerdown', e => {
  dragging = true;
  lastPt = { x: e.clientX, y: e.clientY };
  wrap.classList.add('dragging');
  wrap.setPointerCapture(e.pointerId);
});

wrap.addEventListener('pointermove', e => {
  if (!dragging) return;
  camera.x += e.clientX - lastPt.x;
  camera.y += e.clientY - lastPt.y;
  lastPt = { x: e.clientX, y: e.clientY };
  worker.postMessage({ type: 'camera', data: { camera: { ...camera } } });
});

wrap.addEventListener('pointerup', () => {
  dragging = false;
  wrap.classList.remove('dragging');
});

// ── Zoom ──────────────────────────────────────────────────────────
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  camera.x = mx - (mx - camera.x) * factor;
  camera.y = my - (my - camera.y) * factor;
  camera.zoom = Math.min(4, Math.max(0.02, camera.zoom * factor));
  worker.postMessage({ type: 'camera', data: { camera: { ...camera } } });
}, { passive: false });

// ── Controls ──────────────────────────────────────────────────────
window.resetView = () => {
  camera = { x: 0, y: 0, zoom: 1 };
  worker.postMessage({ type: 'camera', data: { camera: { ...camera } } });
};

window.zoomToFit = () => {
  const totalW = COLS * (CARD_W + GAP_X);
  const totalH = Math.ceil(cards.length / COLS) * (CARD_H + GAP_Y);
  const scaleX = wrap.clientWidth / totalW;
  const scaleY = wrap.clientHeight / totalH;
  camera.zoom = Math.min(scaleX, scaleY) * 0.9;
  camera.x = (wrap.clientWidth - totalW * camera.zoom) / 2;
  camera.y = (wrap.clientHeight - totalH * camera.zoom) / 2;
  worker.postMessage({ type: 'camera', data: { camera: { ...camera } } });
};

window.addCards = (n) => {
  for (let i = 0; i < n; i++) {
    const idx = cards.length;
    const col = idx % COLS;
    const row = Math.floor(idx / COLS);
    cards.push({
      x: col * (CARD_W + GAP_X),
      y: row * (CARD_H + GAP_Y),
      w: CARD_W,
      h: CARD_H,
      title: 'Card ' + (idx + 1),
      body: 'Row ' + (row + 1) + ' Col ' + (col + 1),
    });
  }
  worker.postMessage({ type: 'cards', data: { cards: [...cards] } });
  stats.textContent = cards.length + ' cards';
};
</script>
</body>
</html>
